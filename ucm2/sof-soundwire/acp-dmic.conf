# Internal microphone (ACP DMIC) — minimal UCM device profile
#
# Machine: ASUS ProArt PX13 (HN7306), card components "cfg-amp:2 hs:rt721"
# ALSA PCM: hw:${CardId},4  (acp-dmic-codec dmic-hifi-4)
# Hardware format: S32_LE (PipeWire/ACP negotiates for apps)

SectionDevice."Mic" {
	Comment "Internal Microphone"

	Value {
		CapturePriority 250
		CapturePCM "hw:${CardId},4"
		CaptureChannels 2
	}
}
