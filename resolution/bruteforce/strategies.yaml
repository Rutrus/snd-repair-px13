# Strategy index — bruteforce recovery

version: 2
branch: resolution/bruteforce
default_order:
  - R200
  - R300
  - R550
  - R500
  - R100
  - R400
  - R700
  - R600

campaigns:
  V100:
    name: strategy_validation
    strategies: [V001, V002, V003]
    note: "Run via --validate before recovery; confirms actions occur"
  R100:
    name: software_restart
    strategies: [S001, S002]
  R200:
    name: alsa_module_stack
    strategies: [S010]
  R300:
    name: nuclear_sequences
    strategies: [S020]
  R400:
    name: runtime_pm_modules
    strategies: [S030]
  R500:
    name: pci_flr
    strategies: [S040]
  R550:
    name: pci_remove_rescan
    strategies: [S070]
  R600:
    name: recover_then_suspend
    strategies: [S060]
  R700:
    name: acpi_d3d0
    strategies: [S050]

strategies:
  V001:
    script: validate/V001-modules.sh
    cost: 0
    validate_only: true
