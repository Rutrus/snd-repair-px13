# Ejecutar validación solo tras px13-audio-resume (no px13-audio-rebind).
[Service]
# Extra settle tras PM -110 antes del reset PCI (sumado al sleep 3 de brainchillz)
ExecStartPre=/bin/sleep 8
Environment=PX13_AFTER_SUSPEND=1
Environment=SND_REPAIR_REPO=@REPO_ROOT@
EnvironmentFile=-/etc/default/px13-snd-repair
SuccessExitStatus=1
